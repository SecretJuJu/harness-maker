rules:
  - id: rule-001
    name: readme-dual-language-sync
    description: "README.md and README.ko.md must be updated together; they are a 1:1 bilingual contract."
    severity: error
    scope:
      glob: "README*.md"
      trigger: commit
    examples:
      good: "Commit edits both README.md and README.ko.md, keeping section headings, numbered steps, and examples aligned."
      bad: "Commit touches only README.md; the Korean mirror drifts out of sync."
    exceptions: "None. Even a one-sided typo fix should be paired so the contract is preserved."
    check: ".harness/hooks/check-readme-sync.sh"

  - id: rule-002
    name: harness-artifact-tag-required
    description: "Every generated artifact must carry its originating rule id so the harness can trace it back. Markdown files use [Harness: rule-XXX]; shell hook scripts use a '# harness: rule-XXX' header comment."
    severity: error
    scope:
      glob: ".claude/rules/*.md,.harness/hooks/*.sh"
      trigger: commit
    pattern: '(\[Harness: rule-[0-9]+\])|(^# harness: rule-[0-9]+)'
    examples:
      good: ".claude/rules/foo.md body contains '[Harness: rule-042]'; .harness/hooks/check-foo.sh starts with '# harness: rule-042'."
      bad: "Rule file without the tag; hook script with no header comment — artifact cannot be traced back for updates or deletion."
    exceptions: "None. The tag is the traceability contract."
    check: ".harness/hooks/check-harness-tag.sh"

  - id: rule-003
    name: skill-references-cross-ref
    description: "SKILL.md links to references/*.md files in its mechanism guide. All such links must resolve to files that actually exist under skills/harness-maker/references/."
    severity: error
    scope:
      glob: "skills/harness-maker/SKILL.md,skills/harness-maker/references/*.md"
      trigger: commit
    examples:
      good: "SKILL.md references 'references/eslint.md' and skills/harness-maker/references/eslint.md exists."
      bad: "Reference file renamed without updating the SKILL.md bullet — link now broken."
    exceptions: "None."
    check: ".harness/hooks/check-skill-refs.sh"

  - id: rule-004
    name: conventional-commits
    description: "Commit messages follow Conventional Commits: 'type(scope)?: subject'. Allowed types: feat, fix, docs, style, refactor, test, chore, perf, ci, build, revert."
    severity: error
    scope:
      trigger: commit
    pattern: '^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\([^)]+\))?!?: .+'
    examples:
      good: "'docs: switch README to English by default', 'chore: add .gitignore', 'feat(skill): add performance reference'."
      bad: "'update readme', 'fix stuff'."
    exceptions: "Merge, Revert, fixup!, and squash! commits are auto-generated by git and skipped."
    check: ".harness/hooks/check-conventional-commits.sh"

  - id: rule-005
    name: skill-english-only
    description: "All Skill content under skills/*/{SKILL.md,references/**,templates/**} must be written in English. LLM agents consume the Skills across projects; mixed-language content causes inconsistent interpretation. Hangul, Han, and Kana code points are rejected outside YAML frontmatter."
    severity: error
    scope:
      glob: "skills/*/SKILL.md,skills/*/references/*.md,skills/*/templates/*"
      trigger: commit
    examples:
      good: "SKILL.md body, references/*.md, and templates/rules.yaml use English prose, comments, and example values. Non-English trigger phrases inside the YAML frontmatter (between the leading '---' fences) are exempt because they are matched by the Claude Code skill dispatcher, not read by humans as prose."
      bad: "templates/rules.yaml comments written in Korean; references/eslint.md body contains Hangul characters."
    exceptions: "SKILL.md YAML frontmatter (top '---' block) is exempt so multilingual trigger phrases in the 'description' field still work. README.ko.md lives at the repo root (outside skills/) and stays Korean under the rule-001 dual-language contract."
    check: ".harness/hooks/check-skill-english.sh"

  - id: rule-006
    name: skills-readme-sync
    description: "When anything under skills/** changes, the agent must evaluate whether README.md and README.ko.md need updating (install instructions, skill list, trigger phrases, user-facing behavior) and update them if so. Internal-only changes (typo fixes, reference-file reorg without user-visible impact) may proceed without a README edit."
    severity: warn
    scope:
      glob: "skills/**"
      trigger: commit
    examples:
      good: "Adding a new Skill also adds an install block and trigger-phrase row to both READMEs. Renaming a Skill updates every README mention in the same commit."
      bad: "Skill behavior or trigger phrases change but the READMEs still describe the old state — new users get wrong instructions."
    exceptions: "Pure internal refactors with no user-visible change (typo in a reference file, restructuring templates/ without changing its public shape)."
    check: ".harness/hooks/check-skills-readme.sh"
