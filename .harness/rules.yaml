rules:
  - id: rule-001
    name: readme-dual-language-sync
    description: "README.md and README.ko.md must be updated together; they are a 1:1 bilingual contract."
    severity: error
    scope:
      glob: "README*.md"
      trigger: commit
    examples:
      good: "Commit edits both README.md and README.ko.md, keeping section headings, numbered steps, and examples aligned."
      bad: "Commit touches only README.md; the Korean mirror drifts out of sync."
    exceptions: "None. Even a one-sided typo fix should be paired so the contract is preserved."
    check: ".harness/hooks/check-readme-sync.sh"

  - id: rule-002
    name: harness-artifact-tag-required
    description: "Every generated artifact must carry its originating rule id so the harness can trace it back. Markdown files use [Harness: rule-XXX]; shell hook scripts use a '# harness: rule-XXX' header comment."
    severity: error
    scope:
      glob: ".claude/rules/*.md,.harness/hooks/*.sh"
      trigger: commit
    pattern: '(\[Harness: rule-[0-9]+\])|(^# harness: rule-[0-9]+)'
    examples:
      good: ".claude/rules/foo.md body contains '[Harness: rule-042]'; .harness/hooks/check-foo.sh starts with '# harness: rule-042'."
      bad: "Rule file without the tag; hook script with no header comment — artifact cannot be traced back for updates or deletion."
    exceptions: "None. The tag is the traceability contract."
    check: ".harness/hooks/check-harness-tag.sh"

  - id: rule-003
    name: skill-references-cross-ref
    description: "SKILL.md links to references/*.md files in its mechanism guide. All such links must resolve to files that actually exist under skills/harness-maker/references/."
    severity: error
    scope:
      glob: "skills/harness-maker/SKILL.md,skills/harness-maker/references/*.md"
      trigger: commit
    examples:
      good: "SKILL.md references 'references/eslint.md' and skills/harness-maker/references/eslint.md exists."
      bad: "Reference file renamed without updating the SKILL.md bullet — link now broken."
    exceptions: "None."
    check: ".harness/hooks/check-skill-refs.sh"

  - id: rule-004
    name: conventional-commits
    description: "Commit messages follow Conventional Commits: 'type(scope)?: subject'. Allowed types: feat, fix, docs, style, refactor, test, chore, perf, ci, build, revert."
    severity: error
    scope:
      trigger: commit
    pattern: '^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\([^)]+\))?!?: .+'
    examples:
      good: "'docs: switch README to English by default', 'chore: add .gitignore', 'feat(skill): add performance reference'."
      bad: "'update readme', 'fix stuff'."
    exceptions: "Merge, Revert, fixup!, and squash! commits are auto-generated by git and skipped."
    check: ".harness/hooks/check-conventional-commits.sh"
